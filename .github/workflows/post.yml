name: Threads自動投稿（アカウント1）

# 時刻はすべてUTC。JST = UTC+9。
# リーチ回復のため少量運用：JST 7,8,18,19,20,22,23時 に各1本＝1日7ツリー
#   → UTC 22,23,9,10,11,13,14時 の :15
on:
  schedule:
    - cron: "15 22,23,9,10,11,13,14 * * *"
  workflow_dispatch: {}   # 手動実行も可能

permissions:
  contents: write   # state.json / post_log.jsonl をコミットして戻すため

concurrency:
  group: threads-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 投稿
        env:
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python3 auto_post.py
      - name: 状態を保存
        run: |
          git config user.name "threads-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --no-edit --rebase || true
          git add state.json post_log.jsonl || true
          git commit -m "auto: 投稿ログ更新 [skip ci]" || echo "変更なし"
          git push || echo "push不要"
