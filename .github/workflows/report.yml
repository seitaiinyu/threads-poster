name: 日次レポート（アカウント1）

# JST 0:30 = UTC 15:30。前日分を集計。
on:
  schedule:
    - cron: "30 15 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 前日レポート生成
        env:
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: |
          YDAY=$(date -u -d "yesterday" +%Y-%m-%d)
          python3 analyze_day.py "$YDAY"
      - name: レポートを保存
        run: |
          git config user.name "threads-bot"
          git config user.email "bot@users.noreply.github.com"
          git add reports daily_report_*.txt 2>/dev/null || true
          git commit -m "auto: 日次レポート [skip ci]" || echo "変更なし"
          git push || echo "push不要"
