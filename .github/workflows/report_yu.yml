name: 日次レポート（アカウント2 坐骨）

# JST 0:40 = UTC 15:40。前日分を集計。
on:
  schedule:
    - cron: "40 15 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 前日レポート生成
        env:
          ACCOUNT: "yu"
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID_YU }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN_YU }}
        run: |
          YDAY=$(date -u -d "yesterday" +%Y-%m-%d)
          python3 analyze_day.py "$YDAY"
      - name: レポートを保存
        run: |
          git config user.name "threads-bot"
          git config user.email "bot@users.noreply.github.com"
          git pull --no-edit --rebase || true
          git add daily_report_yu_*.txt 2>/dev/null || true
          git commit -m "auto: 日次レポート(アカウント2) [skip ci]" || echo "変更なし"
          git push || echo "push不要"
